name: Daily LeetCode Solver

on:
  schedule:
    - cron: '30 03 * * *'   # 03:30 AM UTC = 9:00 AM IST
  workflow_dispatch:         # allows manual "Run workflow" trigger for testing

jobs:
  solve-and-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Solve, submit, and email
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSIONS }}
          LEETCODE_CSRF: ${{ secrets.LEETCODE_CSRF }}
        run: python solve_and_email.py
